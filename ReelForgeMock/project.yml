name: ReelForge
options:
  bundleIdPrefix: com.example.reelforge
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.1"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ReelForge:
    type: application
    platform: iOS
    sources:
      - path: ReelForge
    settings:
      base:
        INFOPLIST_FILE: ReelForge/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.reelforge
        PRODUCT_NAME: ReelForge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
